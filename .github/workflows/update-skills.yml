name: Update Skill HUD

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch skill XP from Notion and write skills.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, time, math, urllib.request

          TOKEN = os.environ["NOTION_TOKEN"]

          # ── Leveling curve ────────────────────────────────────────────────────
          # XP needed to go FROM level N to N+1 = floor(100 * N^1.8)
          # This makes each level progressively harder:
          #   L1→2: 100 XP  |  L5→6: 1,858 XP  |  L10→11: 6,310 XP  |  L20→21: 21,450 XP
          def xp_for_level(n):
              return int(100 * n ** 1.8)

          def level_from_xp(total_xp):
              level = 1
              accumulated = 0
              while True:
                  needed = xp_for_level(level)
                  if accumulated + needed > total_xp:
                      break
                  accumulated += needed
                  level += 1
              xp_into = total_xp - accumulated
              xp_needed = xp_for_level(level)
              pct = round(xp_into / xp_needed * 100) if xp_needed > 0 else 0
              return level, xp_into, xp_needed, pct

          # ── Skill themes ──────────────────────────────────────────────────────
          THEMES = {
            "FINANCE":     {"icon": "💰", "accent": "#ffd700", "barStart": "#b8860b", "barEnd": "#ffd700"},
            "PROGRAMMING": {"icon": "💻", "accent": "#4ade80", "barStart": "#00600f", "barEnd": "#00e676"},
            "FITNESS":     {"icon": "💪", "accent": "#ff6b4a", "barStart": "#c62828", "barEnd": "#ff7043"},
            "SPORTS":      {"icon": "🏀", "accent": "#c77ddb", "barStart": "#6a1b9a", "barEnd": "#ce93d8"},
            "HOBBIES":     {"icon": "🎮", "accent": "#fbb040", "barStart": "#e65100", "barEnd": "#ffcc02"},
            "SCHOOL":      {"icon": "🎓", "accent": "#60a5fa", "barStart": "#0d47a1", "barEnd": "#64b5f6"},
          }

          # ── Fetch XP from XP Tracker database ────────────────────────────────
          # This DB is the single source of truth: one row per skill, manually updated
          # when tasks/projects/goals/achievements are completed. No pre-counting.
          XP_TRACKER_DB = "38970bbf-26ca-4aff-b573-c35e36de1c7a"
          XP_URL = f"https://api.notion.com/v1/databases/{XP_TRACKER_DB}/query"

          xp_payload = json.dumps({"page_size": 20}).encode()
          xp_req = urllib.request.Request(
            XP_URL, data=xp_payload, method="POST",
            headers={
              "Authorization":  f"Bearer {TOKEN}",
              "Notion-Version": "2022-06-28",
              "Content-Type":   "application/json",
            }
          )
          with urllib.request.urlopen(xp_req, timeout=20) as resp:
            pages = json.loads(resp.read()).get("results", [])

          skills = []
          for page in pages:
            props = page.get("properties", {})

            # Skill name
            skill_name = "".join(
              t.get("plain_text", "")
              for t in props.get("Skill", {}).get("title", [])
            ).strip().upper()

            # XP Earned (number property — what was actually earned, no pre-counting)
            xp_prop = props.get("XP Earned", {})
            total_xp = int(xp_prop.get("number") or 0)

            if skill_name not in THEMES:
              continue

            level, xp_into, xp_needed, pct = level_from_xp(total_xp)
            theme = THEMES[skill_name]

            skills.append({
              "name":      skill_name,
              "totalXP":   total_xp,
              "level":     level,
              "xpInto":    xp_into,
              "xpNeeded":  xp_needed,
              "pct":       pct,
              **theme,
            })

          # ── Tasks due today (incomplete, due date = today in PST) ──────────
          from datetime import datetime, timezone, timedelta

          PDT = timezone(timedelta(hours=-7))   # PDT (UTC-7); change to -8 Nov-Mar
          today_str = datetime.now(PDT).strftime("%Y-%m-%d")

          TASKS_DB  = "40afee182dcb4447bd69e10d95b9c681"
          TASKS_URL = f"https://api.notion.com/v1/databases/{TASKS_DB}/query"

          tasks_payload = json.dumps({
            "filter": {
              "and": [
                {"property": "Complete", "status": {"does_not_equal": "Done"}},
                {"property": "Due",      "date":   {"equals": today_str}},
              ]
            },
            "page_size": 100,
          }).encode()

          tasks_req = urllib.request.Request(
            TASKS_URL, data=tasks_payload, method="POST",
            headers={
              "Authorization":  f"Bearer {TOKEN}",
              "Notion-Version": "2022-06-28",
              "Content-Type":   "application/json",
            }
          )
          try:
            with urllib.request.urlopen(tasks_req, timeout=20) as tr:
              tasks_data = json.loads(tr.read())
            tasks_today = len(tasks_data.get("results", []))
          except Exception as e:
            print(f"Warning: could not fetch tasks ({e}); defaulting to 0")
            tasks_today = 0

          print(f"Tasks due today ({today_str}): {tasks_today}")

          # ── Fetch streak from life-os-widgets habits.json ─────────────────
          HABITS_URL = "https://raw.githubusercontent.com/EdwinBullian/life-os-widgets/main/habits.json"
          try:
            with urllib.request.urlopen(HABITS_URL, timeout=10) as hr:
              habits_json = json.loads(hr.read())
            streak = habits_json.get("streak", 0)
            print(f"Streak from habits.json: {streak}")
          except Exception as e:
            print(f"Warning: could not fetch habits.json ({e}); streak=0")
            streak = 0

          # ── Write output ──────────────────────────────────────────────────
          output = {
            "skills":     skills,
            "streak":     streak,
            "tasksToday": tasks_today,
            "updated":    int(time.time()),
          }
          with open("skills.json", "w") as f:
            json.dump(output, f, indent=2, ensure_ascii=False)

          print(f"Wrote {len(skills)} skills to skills.json")
          for s in skills:
            print(f"  {s['icon']}  {s['name']:12s}  XP={s['totalXP']:5d}  LV{s['level']}  ({s['pct']}% to LV{s['level']+1})")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update skill XP [skip ci]" && git push
