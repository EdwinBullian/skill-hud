name: Update Skill HUD

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch skill XP from Notion and write skills.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, time, urllib.request

          TOKEN   = os.environ["NOTION_TOKEN"]
          DB_ID   = "6fb7c599-84eb-414d-84bd-3b8492545c6b"
          API_URL = f"https://api.notion.com/v1/databases/{DB_ID}/query"

          THEMES = {
            "FITNESS":     {"icon":"💪","accent":"#ff6b4a","barStart":"#c62828","barEnd":"#ff7043"},
            "SPORTS":      {"icon":"🏀","accent":"#c77ddb","barStart":"#6a1b9a","barEnd":"#ce93d8"},
            "FINANCE":     {"icon":"💰","accent":"#ffd700","barStart":"#b8860b","barEnd":"#ffd700"},
            "PROGRAMMING": {"icon":"💻","accent":"#4ade80","barStart":"#00600f","barEnd":"#00e676"},
            "HOBBIES":     {"icon":"🎮","accent":"#fbb040","barStart":"#e65100","barEnd":"#ffcc02"},
            "COOKING":     {"icon":"🎮","accent":"#fbb040","barStart":"#e65100","barEnd":"#ffcc02"},
            "SCHOOL":      {"icon":"🎓","accent":"#60a5fa","barStart":"#0d47a1","barEnd":"#64b5f6"},
          }
          EMOJI_TO_KEY = {v["icon"]: k for k, v in THEMES.items()}

          payload = json.dumps({
            "filter": {"property": "Is Skill", "checkbox": {"equals": True}},
            "sorts":  [{"property": "Total XP", "direction": "descending"}],
            "page_size": 20,
          }).encode()

          req = urllib.request.Request(
            API_URL, data=payload, method="POST",
            headers={
              "Authorization":  f"Bearer {TOKEN}",
              "Notion-Version": "2022-06-28",
              "Content-Type":   "application/json",
            }
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
            pages = json.loads(resp.read()).get("results", [])

          skills = []
          for page in pages:
            props = page.get("properties", {})

            # --- name ---
            raw = "".join(t.get("plain_text","")
                          for t in props.get("Name",{}).get("title",[]))
            name = raw.strip()
            for emoji, key in EMOJI_TO_KEY.items():
              if name.startswith(emoji):
                name = key
                break
            else:
              name = name.upper().split()[-1] if name else "UNKNOWN"

            # --- XP --- (Total XP is a formula, not a plain number)
            xp_prop = props.get("Total XP", {})
            if xp_prop.get("type") == "formula":
              fval = xp_prop.get("formula", {})
              xp = int(fval.get("number") or fval.get("string") or 0)
            else:
              xp = int(xp_prop.get("number") or 0)

            # Normalize legacy name
            if name == "COOKING":
              name = "HOBBIES"

            theme = THEMES.get(name, {
              "icon":"⭐","accent":"#888","barStart":"#333","barEnd":"#888"
            })
            skills.append({"name": name, "totalXP": xp, **theme})

          # ── Tasks due today (incomplete, due date = today in PST) ──────────
          from datetime import datetime, timezone, timedelta

          PDT = timezone(timedelta(hours=-7))   # PDT (UTC-7); change to -8 Nov-Mar
          today_str = datetime.now(PDT).strftime("%Y-%m-%d")

          TASKS_DB  = "40afee182dcb4447bd69e10d95b9c681"
          TASKS_URL = f"https://api.notion.com/v1/databases/{TASKS_DB}/query"

          tasks_payload = json.dumps({
            "filter": {
              "and": [
                {"property": "Complete", "status": {"does_not_equal": "Done"}},
                {"property": "Due",      "date":   {"equals": today_str}},
              ]
            },
            "page_size": 100,
          }).encode()

          tasks_req = urllib.request.Request(
            TASKS_URL, data=tasks_payload, method="POST",
            headers={
              "Authorization":  f"Bearer {TOKEN}",
              "Notion-Version": "2022-06-28",
              "Content-Type":   "application/json",
            }
          )
          try:
            with urllib.request.urlopen(tasks_req, timeout=20) as tr:
              tasks_data = json.loads(tr.read())
            tasks_today = len(tasks_data.get("results", []))
          except Exception as e:
            print(f"Warning: could not fetch tasks ({e}); defaulting to 0")
            tasks_today = 0

          print(f"Tasks due today ({today_str}): {tasks_today}")

          # ── Fetch streak from life-os-widgets habits.json ─────────────────
          HABITS_URL = "https://raw.githubusercontent.com/EdwinBullian/life-os-widgets/main/habits.json"
          try:
            with urllib.request.urlopen(HABITS_URL, timeout=10) as hr:
              habits_json = json.loads(hr.read())
            streak = habits_json.get("streak", 0)
            print(f"Streak from habits.json: {streak}")
          except Exception as e:
            print(f"Warning: could not fetch habits.json ({e}); streak=0")
            streak = 0

          # ── Write output ──────────────────────────────────────────────────
          output = {
            "skills":     skills,
            "streak":     streak,
            "tasksToday": tasks_today,
            "updated":    int(time.time()),
          }
          with open("skills.json", "w") as f:
            json.dump(output, f, indent=2, ensure_ascii=False)

          print(f"Wrote {len(skills)} skills to skills.json")
          for s in skills:
            lvl = s["totalXP"] // 100 + 1
            print(f"  {s['icon']}  {s['name']:12s}  XP={s['totalXP']:4d}  LV{lvl}")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update skill XP [skip ci]" && git push
