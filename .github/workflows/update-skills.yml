name: Update Skill HUD

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compute XP from completed Notion items and write skills.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, time, math, urllib.request, urllib.error

          TOKEN = os.environ["NOTION_TOKEN"]
          HEADERS = {
            "Authorization":  f"Bearer {TOKEN}",
            "Notion-Version": "2022-06-28",
            "Content-Type":   "application/json",
          }

          # ── Notion query helper (handles pagination) ──────────────────────────
          def notion_query(db_id, payload, label=""):
            url = f"https://api.notion.com/v1/databases/{db_id}/query"
            results = []
            cursor = None
            while True:
              body = dict(payload)
              body["page_size"] = 100
              if cursor:
                body["start_cursor"] = cursor
              req = urllib.request.Request(
                url, data=json.dumps(body).encode(), method="POST", headers=HEADERS
              )
              with urllib.request.urlopen(req, timeout=20) as r:
                data = json.loads(r.read())
              results.extend(data.get("results", []))
              if not data.get("has_more"):
                break
              cursor = data.get("next_cursor")
            print(f"  {label}: {len(results)} rows")
            return results

          def notion_update(page_id, props):
            url = f"https://api.notion.com/v1/pages/{page_id}"
            body = {"properties": props}
            req = urllib.request.Request(
              url, data=json.dumps(body).encode(), method="PATCH", headers=HEADERS
            )
            with urllib.request.urlopen(req, timeout=20) as r:
              return json.loads(r.read())

          def get_text(prop):
            if not prop: return ""
            t = prop.get("type")
            if t == "title":
              return "".join(x.get("plain_text","") for x in prop.get("title",[]))
            if t == "rich_text":
              return "".join(x.get("plain_text","") for x in prop.get("rich_text",[]))
            return ""

          def get_number(prop):
            if not prop: return 0
            t = prop.get("type")
            if t == "number": return prop.get("number") or 0
            if t == "formula":
              f = prop.get("formula", {})
              return f.get("number") or 0
            return 0

          def get_checkbox(prop):
            if not prop: return False
            return prop.get("checkbox", False)

          def get_relation_ids(prop):
            if not prop: return []
            return [r["id"].replace("-","") for r in prop.get("relation", [])]

          # ── Skill themes ──────────────────────────────────────────────────────
          THEMES = {
            "FINANCE":     {"icon": "💰", "accent": "#ffd700", "barStart": "#b8860b", "barEnd": "#ffd700"},
            "PROGRAMMING": {"icon": "💻", "accent": "#4ade80", "barStart": "#00600f", "barEnd": "#00e676"},
            "FITNESS":     {"icon": "💪", "accent": "#ff6b4a", "barStart": "#c62828", "barEnd": "#ff7043"},
            "SPORTS":      {"icon": "🏀", "accent": "#c77ddb", "barStart": "#6a1b9a", "barEnd": "#ce93d8"},
            "HOBBIES":     {"icon": "🎮", "accent": "#fbb040", "barStart": "#e65100", "barEnd": "#ffcc02"},
            "SCHOOL":      {"icon": "🎓", "accent": "#60a5fa", "barStart": "#0d47a1", "barEnd": "#64b5f6"},
          }

          # Area name/field → skill key mapping
          FIELD_TO_SKILL = {
            "Finance":  "FINANCE",
            "Coding":   "PROGRAMMING",
            "Sports":   "SPORTS",
            "School":   "SCHOOL",
          }
          NAME_TO_SKILL = {
            "Finance":     "FINANCE",
            "Finances":    "FINANCE",
            "Programming": "PROGRAMMING",
            "Coding":      "PROGRAMMING",
            "Fitness":     "FITNESS",
            "Sports":      "SPORTS",
            "Hobbies":     "HOBBIES",
            "School":      "SCHOOL",
            "Personal":    "HOBBIES",
          }

          # ── Database IDs ──────────────────────────────────────────────────────
          AREAS_DB        = "08be7317-801c-49cc-83ff-589da11a62a6"
          TASKS_DB        = "c87931c9-3b5f-4721-bd2f-946204b76d25"
          PROJECTS_DB     = "02b4e1f3-beca-4281-8156-8ada9173004d"
          GOALS_DB        = "8396b50f-7479-4a48-8b8c-749ee6c84452"
          ACHIEVEMENTS_DB = "b6397050-8b92-4fbf-b7ca-c8f3bcbcb2fa"
          XP_TRACKER_DB   = "38970bbf-26ca-4aff-b573-c35e36de1c7a"

          print("=== Fetching Areas ===")
          area_pages = notion_query(AREAS_DB, {}, "Areas")

          # Build area_id → skill_key map
          area_to_skill = {}
          for p in area_pages:
            props = p.get("properties", {})
            area_id = p["id"].replace("-", "")
            name = get_text(props.get("Name"))

            # Try name first, then Field multi-select
            skill = NAME_TO_SKILL.get(name)
            if not skill:
              fields = props.get("Field", {}).get("multi_select", [])
              for f in fields:
                skill = FIELD_TO_SKILL.get(f.get("name",""))
                if skill: break
            if skill:
              area_to_skill[area_id] = skill
              print(f"  Area '{name}' → {skill}")

          def skill_from_areas(relation_prop):
            """Given a relation property pointing to Areas, return the skill key."""
            ids = get_relation_ids(relation_prop)
            for aid in ids:
              sk = area_to_skill.get(aid)
              if sk: return sk
            return None

          # ── Accumulate XP ─────────────────────────────────────────────────────
          xp = {k: 0 for k in THEMES}

          print("\n=== Completed Tasks ===")
          tasks = notion_query(TASKS_DB, {
            "filter": {"property": "Complete", "status": {"equals": "Done"}}
          }, "done tasks")
          for p in tasks:
            props = p.get("properties", {})
            task_xp = get_number(props.get("XP Earned"))
            # XP Override takes precedence if set
            override = get_number(props.get("XP Override"))
            if override: task_xp = override
            skill = skill_from_areas(props.get("Area"))
            if skill and task_xp:
              xp[skill] += int(task_xp)

          print("\n=== Completed Projects ===")
          projects = notion_query(PROJECTS_DB, {
            "filter": {"property": "Status", "select": {"equals": "Completed"}}
          }, "completed projects")
          for p in projects:
            props = p.get("properties", {})
            proj_xp = get_number(props.get("XP Reward"))
            skill = skill_from_areas(props.get("Area"))
            if skill and proj_xp:
              xp[skill] += int(proj_xp)

          print("\n=== Completed Goals ===")
          goals = notion_query(GOALS_DB, {
            "filter": {"property": "Status", "select": {"equals": "Completed"}}
          }, "completed goals")
          for g in goals:
            props = g.get("properties", {})
            goal_xp = get_number(props.get("XP Reward"))
            skill = skill_from_areas(props.get("Areas"))
            if skill and goal_xp:
              xp[skill] += int(goal_xp)

          print("\n=== Unlocked Achievements ===")
          achievements = notion_query(ACHIEVEMENTS_DB, {
            "filter": {"property": "Unlocked", "checkbox": {"equals": True}}
          }, "unlocked achievements")
          for a in achievements:
            props = a.get("properties", {})
            ach_xp = get_number(props.get("XP Bonus"))
            skill = skill_from_areas(props.get("Area"))
            if skill and ach_xp:
              xp[skill] += int(ach_xp)
            elif ach_xp:
              # Achievements without an area → distribute across all skills equally
              # (streak achievements, etc.) — skip for now, could add OVERALL later
              pass

          print(f"\nXP totals: {xp}")

          # ── Leveling curve ────────────────────────────────────────────────────
          # XP to go from level N to N+1 = floor(100 * N^1.8)
          def xp_for_level(n):
            return int(100 * n ** 1.8)

          def level_from_xp(total_xp):
            level = 1
            accumulated = 0
            while True:
              needed = xp_for_level(level)
              if accumulated + needed > total_xp:
                break
              accumulated += needed
              level += 1
            xp_into = total_xp - accumulated
            xp_needed = xp_for_level(level)
            pct = round(xp_into / xp_needed * 100) if xp_needed > 0 else 0
            return level, xp_into, xp_needed, pct

          # ── Build skills list ─────────────────────────────────────────────────
          skills = []
          for skill_name, theme in THEMES.items():
            total_xp = xp[skill_name]
            level, xp_into, xp_needed, pct = level_from_xp(total_xp)
            skills.append({
              "name":     skill_name,
              "totalXP":  total_xp,
              "level":    level,
              "xpInto":   xp_into,
              "xpNeeded": xp_needed,
              "pct":      pct,
              **theme,
            })
            print(f"  {theme['icon']}  {skill_name:12s}  XP={total_xp:5d}  LV{level}  ({pct}% to LV{level+1})")

          # ── Update XP Tracker in Notion ───────────────────────────────────────
          # Query XP Tracker to get page IDs by skill name
          print("\n=== Updating XP Tracker in Notion ===")
          tracker_pages = notion_query(XP_TRACKER_DB, {}, "XP Tracker")
          for tp in tracker_pages:
            props = tp.get("properties", {})
            skill_name = get_text(props.get("Skill")).strip().upper()
            if skill_name in xp:
              try:
                notion_update(tp["id"], {
                  "XP Earned": {"number": xp[skill_name]}
                })
                print(f"  Updated {skill_name} → {xp[skill_name]} XP")
              except Exception as e:
                print(f"  Warning: could not update {skill_name}: {e}")

          # ── Tasks due today ───────────────────────────────────────────────────
          from datetime import datetime, timezone, timedelta
          PDT = timezone(timedelta(hours=-7))
          today_str = datetime.now(PDT).strftime("%Y-%m-%d")

          tasks_payload = {
            "filter": {
              "and": [
                {"property": "Complete", "status": {"does_not_equal": "Done"}},
                {"property": "Due", "date": {"equals": today_str}},
              ]
            }
          }
          try:
            tasks_today_list = notion_query(TASKS_DB, tasks_payload, "tasks due today")
            tasks_today = len(tasks_today_list)
          except Exception as e:
            print(f"Warning: tasks today failed ({e})")
            tasks_today = 0

          # ── Streak ────────────────────────────────────────────────────────────
          HABITS_URL = "https://raw.githubusercontent.com/EdwinBullian/life-os-widgets/main/habits.json"
          try:
            with urllib.request.urlopen(HABITS_URL, timeout=10) as hr:
              streak = json.loads(hr.read()).get("streak", 0)
          except Exception as e:
            print(f"Warning: streak fetch failed ({e})")
            streak = 0

          # ── Write skills.json ─────────────────────────────────────────────────
          output = {
            "skills":     skills,
            "streak":     streak,
            "tasksToday": tasks_today,
            "updated":    int(time.time()),
          }
          with open("skills.json", "w") as f:
            json.dump(output, f, indent=2, ensure_ascii=False)

          print(f"\nWrote {len(skills)} skills to skills.json")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update skill XP [skip ci]" && git push
