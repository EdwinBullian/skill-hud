<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill HUD</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #191919;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 12px 14px;
    }

    /* ── STACK ── */
    .hud {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    /* ── ROW ── */
    .row {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    /* ── LABEL ── */
    .row-label {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 110px;
      flex-shrink: 0;
    }
    .row-icon { font-size: 14px; line-height: 1; flex-shrink: 0; }
    .row-name {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #a8a8a8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row.overall .row-name { color: #dedede; font-size: 11px; letter-spacing: 0.6px; }

    /* ── LEVEL BADGE ── */
    .level-badge {
      height: 20px;
      min-width: 42px;
      padding: 0 7px;
      background: var(--accent);
      color: #111;
      font-size: 10.5px;
      font-weight: 800;
      letter-spacing: 0.2px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── XP BAR ── */
    .bar-wrap {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border-radius: 5px;
      height: 20px;
      overflow: hidden;
      cursor: default;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      background: linear-gradient(90deg, var(--bar-start), var(--bar-end));
      transition: width 1.4s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
      pointer-events: none;
    }
    .bar-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.16) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: sweep 3s ease-in-out infinite;
    }
    @keyframes sweep {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: rgba(255,255,255,0.09); margin: 1px 0; }

    /* ── FOOTER ── */
    .hud-foot {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 8px;
      margin-top: 1px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .streak-block {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .flame-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      font-size: 22px;
      line-height: 1;
    }
    .flame-count {
      position: absolute;
      bottom: 0px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 8.5px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 5px #000, 0 0 5px #000;
      letter-spacing: -0.5px;
      pointer-events: none;
    }
    .streak-label { font-size: 10px; color: rgba(255,255,255,0.4); }
    .foot-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    .xp-to-level { font-size: 10px; color: rgba(255,255,255,0.38); }
    .xp-to-level strong { color: #e2c97e; font-weight: 700; }

    /* ── TOOLTIP ── */
    .sk-tip {
      position: fixed;
      background: #1c2128;
      border: 1px solid #444c56;
      border-radius: 6px;
      padding: 7px 11px;
      font-size: 11px;
      color: #e6edf3;
      pointer-events: none;
      z-index: 9999;
      display: none;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
      line-height: 1.6;
    }
    .sk-tip .tip-name { font-weight: 700; }
    .sk-tip .tip-xp   { color: rgba(255,255,255,0.5); font-size: 10px; }

    /* ── STATUS ── */
    #liveStatus {
      position: fixed;
      bottom: 3px;
      right: 8px;
      font-size: 8px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="hud" id="hud"></div>
  <div class="sk-tip" id="skTip"></div>
  <div id="liveStatus">loading…</div>

  <script>
    const REFRESH = 15 * 60 * 1000;
    const ORDER   = ["FINANCE", "SCHOOL", "FITNESS", "SPORTS", "HOBBIES"];

    const FALLBACK = [
      { name:"FINANCE", icon:"💰", totalXP:250, accent:"#ffd700", barStart:"#b8860b", barEnd:"#ffd700" },
      { name:"SCHOOL",  icon:"🎓", totalXP:0,   accent:"#60a5fa", barStart:"#0d47a1", barEnd:"#64b5f6" },
      { name:"FITNESS", icon:"💪", totalXP:350, accent:"#ff6b4a", barStart:"#c62828", barEnd:"#ff7043" },
      { name:"SPORTS",  icon:"🏀", totalXP:300, accent:"#c77ddb", barStart:"#6a1b9a", barEnd:"#ce93d8" },
      { name:"HOBBIES", icon:"🎮", totalXP:150, accent:"#fbb040", barStart:"#e65100", barEnd:"#ffcc02" },
    ];

    function calcLevel(xp) { return Math.floor(xp / 100) + 1; }
    function calcPct(xp)   { return xp % 100; }

    function normalize(raw) {
      return raw.map(s => ({
        ...s,
        name: s.name.toUpperCase() === "COOKING" ? "HOBBIES" : s.name.toUpperCase()
      }));
    }
    function sortSkills(raw) {
      const norm = normalize(raw);
      return ORDER.map(n => norm.find(s => s.name === n)).filter(Boolean);
    }

    const tip = document.getElementById("skTip");

    function attachTip(el, name, xp, accent) {
      const lv  = calcLevel(xp);
      const cur = calcPct(xp);         // XP earned in current level (0–99)
      const rem = 100 - cur;           // XP remaining to next level
      el.addEventListener("mouseenter", () => {
        tip.innerHTML =
          `<span class="tip-name" style="color:${accent}">${name}</span><br>` +
          `<span class="tip-xp">${cur} / 100 XP &nbsp;·&nbsp; ${rem} XP to LV${lv + 1}</span>`;
        tip.style.display = "block";
      });
      el.addEventListener("mousemove", e => {
        tip.style.left = (e.clientX + 14) + "px";
        tip.style.top  = (e.clientY - 10) + "px";
      });
      el.addEventListener("mouseleave", () => tip.style.display = "none");
    }

    function makeRow(icon, name, level, pct, xp, accent, barStart, barEnd, isOverall) {
      const row = document.createElement("div");
      row.className = "row" + (isOverall ? " overall" : "");
      row.style.cssText = `--accent:${accent};--bar-start:${barStart};--bar-end:${barEnd}`;
      row.innerHTML = `
        <div class="row-label">
          <span class="row-icon">${icon}</span>
          <span class="row-name">${name}</span>
        </div>
        <div class="level-badge">LV${level}</div>
        <div class="bar-wrap">
          <div class="bar-fill" data-pct="${pct}"></div>
        </div>`;
      attachTip(row.querySelector(".bar-wrap"), name, xp, accent);
      return row;
    }

    function render(skills, streak) {
      const sorted = sortSkills(skills);

      // Overall = average XP per skill → level from that average
      const totalXP    = sorted.reduce((s, sk) => s + sk.totalXP, 0);
      const avgXP      = Math.round(totalXP / Math.max(sorted.length, 1));
      const overallLv  = calcLevel(avgXP);
      const overallPct = calcPct(avgXP);
      const overallRem = 100 - overallPct;

      const hud = document.getElementById("hud");
      hud.innerHTML = "";

      // Overall row
      hud.appendChild(makeRow(
        "⭐", "OVERALL", overallLv, overallPct, avgXP,
        "#e2c97e", "#7c6520", "#e2c97e", true
      ));
      hud.appendChild(Object.assign(document.createElement("div"), { className: "divider" }));

      // Skill rows
      sorted.forEach(sk => hud.appendChild(makeRow(
        sk.icon, sk.name,
        calcLevel(sk.totalXP), calcPct(sk.totalXP), sk.totalXP,
        sk.accent, sk.barStart, sk.barEnd, false
      )));

      // Footer: flame streak + XP to level
      const foot = document.createElement("div");
      foot.className = "hud-foot";
      foot.innerHTML = `
        <div class="streak-block">
          <div class="flame-wrap">🔥<span class="flame-count">${streak}</span></div>
          <span class="streak-label">day streak</span>
        </div>
        <div class="foot-sep"></div>
        <div class="xp-to-level"><strong>${overallRem} XP</strong> to next level</div>`;
      hud.appendChild(foot);

      // Animate bars in
      requestAnimationFrame(() => setTimeout(() => {
        document.querySelectorAll(".bar-fill").forEach(b => b.style.width = b.dataset.pct + "%");
      }, 150));
    }

    function setStatus(txt, col) {
      const el = document.getElementById("liveStatus");
      el.textContent = txt;
      if (col) el.style.color = col;
    }

    async function load() {
      try {
        const r = await fetch("./skills.json?t=" + Date.now());
        if (!r.ok) throw new Error("no json");
        const j = await r.json();
        render(j.skills, j.streak ?? 0);
        const d = new Date(j.updated * 1000);
        setStatus("synced " + d.toLocaleString(), "rgba(74,222,128,0.35)");
      } catch {
        render(FALLBACK, 0);
        setStatus("offline · seed data", "rgba(255,255,255,0.15)");
      }
    }

    load();
    setInterval(load, REFRESH);
  </script>
</body>
</html>
